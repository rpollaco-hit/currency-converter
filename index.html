<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Currency Converter | Installable PWA</title>

  <meta name="description" content="Currency Converter built with HTML, CSS and JavaScript. Includes Demo Mode, live API support, installable PWA experience, flags, copy result button and responsive design." />
  <meta name="keywords" content="currency converter, javascript project, pwa, exchange rates, html css javascript, portfolio project" />
  <meta name="author" content="Anderson Marcondes Santana" />
  <meta name="robots" content="index,follow" />
  <meta name="theme-color" content="#7C3AED" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Converter" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./assets/icon-192-coins-real.png">
  <link rel="stylesheet" href="./style.css" />

  <script>
    window.APP_CONFIG = window.APP_CONFIG || {};
  </script>
  <script>
    const configScript = document.createElement("script");
    configScript.src = "./config.js";
    configScript.onerror = () => console.info("config.js not found: running in Demo Mode.");
    document.head.appendChild(configScript);
  </script>
  <script src="./scripts.js" defer></script>
</head>

<body>
  <div class="app-loading" id="appLoading" aria-live="polite">
    <div class="app-loading__card">
      <img class="app-loading__icon" src="./assets/icon-192-coins-real.png" alt="Currency Converter icon">
      <div class="app-loading__spinner" aria-hidden="true"></div>
      <p class="app-loading__title">Currency Converter</p>
      <p class="app-loading__text">Loading exchange tools...</p>
    </div>
  </div>

  <div class="page">
    <div class="app">
      <img class="logo" src="./assets/exchange_currency.png" alt="Currency exchange illustration" />

      <main class="card">
        <label class="field" for="currency-from">
          <span class="field-label">Convert from</span>
          <select id="currency-from" class="currency-select-from" aria-label="Convert from"></select>
        </label>

        <label class="field" for="currency-to">
          <span class="field-label">Convert to</span>
          <select id="currency-to" class="currency-select-to" aria-label="Convert to"></select>
        </label>

        <label class="field" for="amount-input">
          <span class="field-label">Amount</span>
          <input id="amount-input" class="input-amount" type="text" placeholder="100" inputmode="decimal" aria-label="Amount" />
        </label>

        <button type="button" class="swap-button" id="swapButton" aria-label="Swap currencies">⇄ Swap</button>

        <p class="rate-info" id="rateInfo" aria-live="polite"></p>
        <p class="status-message" id="statusMessage" aria-live="polite"></p>

        <section class="result-card" aria-label="Conversion result">
          <div class="result-row">
            <div class="result-meta">
              <div class="badge">
                <img id="fromFlag" class="flag" alt="From currency flag" />
              </div>
              <div class="result-texts">
                <div class="badge-code" id="fromCode">BRL</div>
                <p class="result-name" id="fromName">Brazilian Real</p>
              </div>
            </div>
            <div class="result-amount-box">
              <p class="result-value" id="fromValue">—</p>
            </div>
          </div>

          <div class="result-divider">
            <img class="result-arrow" src="./assets/Vector.png" alt="Conversion direction" />
          </div>

          <div class="result-row">
            <div class="result-meta">
              <div class="badge">
                <img id="toFlag" class="flag" alt="To currency flag" />
              </div>
              <div class="result-texts">
                <div class="badge-code" id="toCode">USD</div>
                <p class="result-name" id="toName">US Dollar</p>
              </div>
            </div>
            <div class="result-amount-actions">
              <div class="result-amount-box result-amount-box--highlight">
                <p class="result-value" id="toValue">—</p>
              </div>
              <button type="button" class="copy-button" id="copyButton" aria-label="Copy converted value">Copy</button>
            </div>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <div class="footer-row">
          <div class="footer-left">
            <p>Built by <strong>Anderson Marcondes Santana</strong></p>
            <div class="footer-links">
              <a href="https://github.com/rpollaco-hit" target="_blank" rel="noopener noreferrer">GitHub</a>
              <span>•</span>
              <a href="https://www.linkedin.com/in/andersonmarcondessantana/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
            </div>
          </div>

          <button type="button" class="install-icon-button" id="installButton" aria-label="Install app" title="Install App">
            <img src="./assets/icon-192-coins-real.png" alt="" aria-hidden="true">
          </button>
        </div>
      </footer>
    </div>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }
  </script>
</body>
</html>
