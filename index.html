<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE-edge" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script src="./config.js"></script>
  <link rel="stylesheet" href="./style.css" />
  <script src="./scripts.js" defer></script>

  <title>DevClub - Convert Money</title>
</head>

<body>
  <div class="page">
    <div class="app">

      <img class="logo" src="./assets/logo.gif" alt="logo" />

      <main class="card">
        <label class="field">
          <span class="field-label" data-i18n="convert_from">Converter de</span>
          <select class="currency-select-from"></select>
        </label>

        <label class="field">
          <span class="field-label" data-i18n="convert_to">Converter para</span>
          <select class="currency-select-to"></select>
        </label>

        <label class="field">
          <span class="field-label" data-i18n="amount">Valor</span>
          <input class="input-amount" type="text" placeholder="100" />
        </label>

        <button type="button" class="swap-button" data-i18n="swap">⇄ Swap</button>

        <p class="rate-info"></p>

        <section class="result-card">
          <div class="result-row">
            <div class="result-meta">
              <div class="badge">
                <img id="fromFlag" class="flag" alt="From flag" />
              </div>
              <div class="result-texts">
                <div class="badge-code" id="fromCode">BRL</div>
                <p class="result-name" id="fromName">—</p>
              </div>
            </div>
            <div class="result-amount-box">
              <p class="result-value" id="fromValue">—</p>
            </div>
          </div>

          <div class="result-divider">
            <img class="result-arrow" src="./assets/Vector.png" alt="direction" />
          </div>

          <div class="result-row">
            <div class="result-meta">
              <div class="badge">
                <img id="toFlag" class="flag" alt="To Flag" />
              </div>
              <div class="result-texts">
                <div class="badge-code" id="toCode">USD</div>
                <p class="result-name" id="toName">—</p>
              </div>
            </div>
            <div class="result-amount-box result-amount-box--highlight">
              <p class="result-value" id="toValue">—</p>
            </div>
          </div>
        </section>
      </main>

    </div>
  </div>
 <footer class="app-footer">
    <p>
      Built by 
      <strong>Anderson Marcondes Santana</strong>
    </p>

    <div class="footer-links">
      <a href="https://github.com/rpollaco-hit" target="_blank">GitHub</a>
      <span>•</span>
      <a href="https://www.linkedin.com/in/andersonmarcondessantana/" target="_blank">LinkedIn</a>
    </div>
  </footer>
</body>
</html>
